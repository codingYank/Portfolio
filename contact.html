<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&family=Teko:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Portfolio | Contact</title>
</head>
<body>
    <div class="form-container">
        <form class="contact-form">
            <label for="name" id="name">Name</label>
            <input type="text" for="name" id="name">                <label for="email" id="email">Email</label>
            <input type="email" for="email" id="email">
            <label for="message" id="message">Message</label>
            <textarea for="message" id="message"></textarea>
            <button class="form-btn" type="submit">Send</button>
        </form>
    </div> 
</body>
</html>
